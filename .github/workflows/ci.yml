name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v

  build:
    name: build and entry point validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build package
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Install built wheel
        run: pip install dist/*.whl

      - name: Verify entry point
        run: claude-prompt-refiner 2>&1 | grep -q "claude CLI not found" && echo "Entry point OK"

  brew-lint:
    name: Homebrew formula lint
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Homebrew formula style
        run: brew style Formula/claude-prompt-refiner.rb
